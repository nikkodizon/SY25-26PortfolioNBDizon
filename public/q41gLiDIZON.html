<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a Movie - Graded Exercise</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; margin-bottom: 20px; color: #333; }

        .form-group { margin-bottom: 15px; }

        label { display: block; font-weight: bold; margin-bottom: 5px; }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }

     
        .star-rating {
            display: flex;
            gap: 5px;
            font-size: 30px;
            cursor: pointer;
            color: #ddd;
        }

        .star.active { color: #ffcc00; }

        #addBtn {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        #addBtn:hover { background-color: #0056b3; }

        .movie-list-section { margin-top: 30px; }

        .movie-card {
            background: #fafafa;
            border: 1px solid #eee;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .list-stars { color: #ffcc00; }
    </style>
</head>
<body>

<div class="card">
    <h2>Add a Movie</h2>
    
    <div class="form-group">
        <label>Title:</label>
        <input type="text" id="title" placeholder="Movie name...">
    </div>

    <div class="form-group">
        <label>Year:</label>
        <input type="text" id="year" placeholder="Release year...">
    </div>

    <div class="form-group">
        <label>Genre:</label>
        <select id="genre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
        </select>
    </div>

    <div class="form-group">
        <label>Rating:</label>
        <div class="star-rating" id="starInput">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
    </div>

    <button id="addBtn">Add Movie</button>

    <div class="movie-list-section">
        <h2 style="font-size: 1.2rem;">Movie List</h2>
        <div id="displayArea"></div>
    </div>
</div>

<script>
    let currentRating = 0;
    const stars = document.querySelectorAll('.star');


    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRating = star.getAttribute('data-value');
            updateStars(currentRating);
        });
    });

    function updateStars(val) {
        stars.forEach(s => {
            s.classList.toggle('active', s.getAttribute('data-value') <= val);
        });
    }


    window.onload = showMovies;


    document.getElementById('addBtn').addEventListener('click', () => {
        const titleVal = document.getElementById('title').value;
        const yearVal = document.getElementById('year').value;
        const genreVal = document.getElementById('genre').value;

        if(!titleVal || !yearVal || currentRating === 0) {
            alert("Please complete the form!");
            return;
        }

        const movieObj = {
            title: titleVal,
            year: yearVal,
            genre: genreVal,
            rating: currentRating
        };
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        movies.push(movieObj);
        localStorage.setItem('movies', JSON.stringify(movies));

        document.getElementById('title').value = '';
        document.getElementById('year').value = '';
        currentRating = 0;
        updateStars(0);
        showMovies();
    });

    function showMovies() {
        const display = document.getElementById('displayArea');
        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        display.innerHTML = '';

        movies.forEach(m => {
            let starIcons = '★'.repeat(m.rating) + '☆'.repeat(5 - m.rating);
            const div = document.createElement('div');
            div.className = 'movie-card';
            div.innerHTML = `${m.title} (${m.year}) - ${m.genre}, Rating: <span class="list-stars">${starIcons}</span>`;
            display.appendChild(div);
        });
    }
</script>

</body>
</html>
